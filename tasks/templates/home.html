<!DOCTYPE html>
<html>
<head>
    <title>Task Portal</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="app-container">

    <aside class="sidebar">
        <h2>Portal</h2>
        <a href="#">Dashboard</a>
        <a href="/add/">+ Add Task</a>
    </aside>

    <main class="main-content">
        <h1>Your Tasks</h1>

        <div class="task-grid">
            {% for task in tasks %}
            <div class="task-card">
                <h3>{{ task.title }}</h3>
                <p>{{ task.description }}</p>
            </div>
            {% empty %}
            <p>No tasks yet.</p>
            {% endfor %}
        </div>

    </main>

</div>

</body>
</html>
